# ai-index: spring boot prod profile configuration low memory concurrency tuning
server:
  compression:
    enabled: true
    min-response-size: 2KB
  shutdown: graceful
  tomcat:
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:3s}
    keep-alive-timeout: ${SERVER_TOMCAT_KEEP_ALIVE_TIMEOUT:15s}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:256}
    max-keep-alive-requests: ${SERVER_TOMCAT_MAX_KEEP_ALIVE_REQUESTS:100}
    processor-cache: ${SERVER_TOMCAT_PROCESSOR_CACHE:48}
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:48}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:8}
      max-queue-capacity: ${SERVER_TOMCAT_THREADS_MAX_QUEUE_CAPACITY:200}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/pipkerdo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&cachePrepStmts=true&prepStmtCacheSize=128&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&useLocalSessionState=true&rewriteBatchedStatements=true&cacheResultSetMetadata=true&cacheServerConfiguration=true&elideSetAutoCommits=true&maintainTimeStats=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:1000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:1000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      keepalive-time: ${DB_POOL_KEEPALIVE_TIME_MS:120000}
  data:
    redis:
      database: ${REDIS_DATABASE:1}
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:500ms}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    org.apache.ibatis: warn
    org.example.backend.mapper: info

storage:
  local:
    base-path: ${STORAGE_LOCAL_BASE_PATH:/data/pipkerdo/file}
    public-base-url: ${STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8080/static/files}
