# ai-index: spring boot dev profile configuration local datasource redis sql logging
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pipkerdo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      timeout: 10s

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    org.example.backend.mapper: debug

storage:
  local:
    base-path: ${STORAGE_LOCAL_BASE_PATH:${user.dir}/file}
    public-base-url: ${STORAGE_LOCAL_PUBLIC_BASE_URL:http://localhost:8080/static/files}

wechat:
  miniapp:
    # AI 索引: 微信小程序密钥只从本地环境变量读取，不在仓库中保留真实值。
    app-id: ${WECHAT_MINIAPP_APP_ID:}
    app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
