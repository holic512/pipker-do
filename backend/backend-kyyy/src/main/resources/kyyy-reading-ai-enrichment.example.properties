# @file kyyy_reading_ai_enrichment_example_properties
# @project pipker-do
# @module 考研英语 / 阅读 AI 补齐
# @description 提供阅读题答案与解析补齐工具的示例配置。
# @logic 1. 配置数据库连接；2. 配置 OpenAI 调用参数；3. 配置并发和置信度阈值。
# @dependencies Tool: KyyyReadingAiEnrichmentMain
# @index_tags 考研英语, 阅读补齐, OpenAI配置, 示例配置
# @author holic512

db.url=jdbc:mysql://127.0.0.1:3306/pipkerdo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
db.username=replace_with_mysql_username
db.password=replace_with_mysql_password

openai.baseUrl=https://api.openai.com/v1
openai.apiType=responses
openai.apiKey=replace_with_openai_api_key
openai.model=gpt-5.5
openai.reasoningEffort=medium
openai.textVerbosity=medium
openai.maxOutputTokens=900
openai.timeoutSeconds=90
openai.maxRetries=2

run.threads=4
quality.minConfidence=0.60
quality.aiMaxAttempts=2
quality.aiReviewEnabled=true
