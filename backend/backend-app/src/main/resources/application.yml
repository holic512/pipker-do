# ai-index: spring boot common configuration shared by dev and prod profiles
server:
  port: 8080

spring:
  application:
    name: pipkerdo
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.example.backend
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      table-underline: true

storage:
  local:
    temp-dir: .tmp
    hash-algorithm: SHA-256
    shard-depth: 2
    shard-width: 2
    keep-extension: true
    allowed-biz-types:
      - avatar
      - kyzz-question-bank-cover

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-head: true
  is-read-cookie: false
  is-read-body: false
  is-share: false

wechat:
  miniapp:
    connect-timeout: 3s
    read-timeout: 5s

llm:
  config-secret: ${LLM_CONFIG_SECRET:ashdkjadjkabkjhsdhkjansdjkasbjk}

anti-crawler:
  enabled: true
  whitelist-ips: []
  groups:
    auth-login:
      one-second-limit: 6
      one-minute-limit: 30
      ten-minute-limit: 100
      cooldown-seconds: 60
      block-seconds: 1800
      escalation-window-seconds: 600
      escalation-threshold: 3
    profile-readwrite:
      one-second-limit: 10
      one-minute-limit: 120
      ten-minute-limit: 500
      cooldown-seconds: 30
      block-seconds: 1800
      escalation-window-seconds: 600
      escalation-threshold: 3
    question-bank-read:
      one-second-limit: 6
      one-minute-limit: 90
      ten-minute-limit: 300
      cooldown-seconds: 60
      block-seconds: 1800
      escalation-window-seconds: 600
      escalation-threshold: 3
    practice-session-read:
      one-second-limit: 4
      one-minute-limit: 120
      ten-minute-limit: 400
      cooldown-seconds: 60
      block-seconds: 1800
      escalation-window-seconds: 600
      escalation-threshold: 3
    practice-submit:
      one-second-limit: 3
      one-minute-limit: 60
      ten-minute-limit: 200
      cooldown-seconds: 60
      block-seconds: 1800
      escalation-window-seconds: 600
      escalation-threshold: 3
    avatar-upload:
      one-second-limit: 0
      one-minute-limit: 10
      ten-minute-limit: 30
      cooldown-seconds: 120
      block-seconds: 1800
      escalation-window-seconds: 600
      escalation-threshold: 3
  behavior:
    scan-question-window-seconds: 300
    scan-question-distinct-threshold: 40
    scan-bank-window-seconds: 600
    scan-bank-distinct-threshold: 8
    robot-window-seconds: 600
    robot-submit-threshold: 20
    robot-fast-used-seconds: 2
    robot-fast-ratio-percent: 80
    multi-ip-window-seconds: 600
    multi-ip-distinct-threshold: 4
    multi-ip-cooldown-seconds: 600
    multi-ip-repeat-window-seconds: 86400
    multi-ip-block-seconds: 1800
    night-read-start-hour: 1
    night-read-end-hour: 5
    night-read-multiplier: 1.5
    suspicious-threshold-factor: 0.5
