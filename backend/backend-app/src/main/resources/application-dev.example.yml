# ai-index: spring boot dev profile example configuration copy to application-dev yml
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/pipkerdo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: replace_with_local_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      password:
      timeout: 10s

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    org.example.backend.mapper: debug

storage:
  type: local
  local:
    base-path: ./file
    public-base-url: http://localhost:8080/static/files
  image-compression:
    enabled: true
    max-width: 1600
    max-height: 1600
    jpeg-quality: 0.82
    min-saving-ratio: 0.05
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID:replace_with_cos_secret_id}
    secret-key: ${TENCENT_COS_SECRET_KEY:replace_with_cos_secret_key}
    region: ap-guangzhou
    bucket: replace_with_bucket_name
    public-base-url:
    signed-url-expire-seconds: 1800
    connection-timeout-ms: 30000
    socket-timeout-ms: 30000
    max-connections: 1024

wechat:
  miniapp:
    app-id: wx_your_miniapp_appid
    app-secret: replace_with_your_wechat_miniapp_secret

llm:
  config-secret: replace_with_local_llm_config_secret
