# ai-index: github-actions workflow maven spring-boot release jar backend
# ai-index: auto build backend on push main and publish github release asset
name: Backend Release

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build backend and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build jar package
        run: mvn -f backend/pom.xml -B clean package -DskipTests

      - name: Prepare release bundle
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(mvn -f backend/pom.xml -q help:evaluate -Dexpression=project.version -DforceStdout)"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="backend-v$(date -u +'%Y%m%d-%H%M%S')-${SHORT_SHA}"
          RELEASE_NAME="backend ${VERSION} (${SHORT_SHA})"
          JAR_PATH="$(find backend/target -maxdepth 1 -type f -name '*.jar' ! -name '*original*.jar' | head -n 1)"

          if [[ -z "${JAR_PATH}" ]]; then
            echo "No packaged jar found in backend/target" >&2
            exit 1
          fi

          mkdir -p dist
          ASSET_NAME="backend-${VERSION}-${SHORT_SHA}.jar"
          cp "${JAR_PATH}" "dist/${ASSET_NAME}"
          sha256sum "dist/${ASSET_NAME}" > "dist/${ASSET_NAME}.sha256"

          {
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "version=${VERSION}"
            echo "asset_path=dist/${ASSET_NAME}"
            echo "checksum_path=dist/${ASSET_NAME}.sha256"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-bundle
          path: |
            ${{ steps.prepare.outputs.asset_path }}
            ${{ steps.prepare.outputs.checksum_path }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.prepare.outputs.version }}
          TAG_NAME: ${{ steps.prepare.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.prepare.outputs.release_name }}
          ASSET_PATH: ${{ steps.prepare.outputs.asset_path }}
          CHECKSUM_PATH: ${{ steps.prepare.outputs.checksum_path }}
        shell: bash
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          if [[ "${VERSION}" == *SNAPSHOT* ]]; then
            EXTRA_ARGS+=(--prerelease)
          fi

          gh release create "${TAG_NAME}" \
            "${ASSET_PATH}" \
            "${CHECKSUM_PATH}" \
            --title "${RELEASE_NAME}" \
            --generate-notes \
            "${EXTRA_ARGS[@]}"
